<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
}

#niraviewer {
  width: 100%;
  height: 100%;
  border: 0;
}
</style>

<script src="https://sdk.nira.app/js/viewer.js"></script>
</head>

<body>

<iframe
  id="niraviewer"
  src="https://nidaros.nira.app/g/y-93qFDYS2W-8ACrlqVj8A">
</iframe>

<script>

let viewer;
let viewerReady = false;
let pendingUuid = null;

const iframe = document.getElementById("niraviewer");

/* --------------------------------------------------
   VENT TIL IFRAME ER LASTET
-------------------------------------------------- */

iframe.addEventListener("load", function() {

  viewer = new NiraAPI.Viewer(iframe, {
    showNavigationTools: true,
    showMeasureTool: true,
    showCalloutsList: true,
    showRenderModes: true,
    suppressCalloutDialog: true
  });

  viewer.on("asset_load_finish", function () {
    viewerReady = true;

    if (pendingUuid) {
      viewer.activateCalloutLabelOrUuid(pendingUuid);
      pendingUuid = null;
    }
  });

  viewer.on("callout_created", function (info) {
    if (info && info.uuid) {
      sendToFileMaker("created|" + info.uuid);
    }
  });

  viewer.on("callout_activated", function (info) {
    if (info && info.uuid) {
      sendToFileMaker("activated|" + info.uuid);
    }
  });

  viewer.on("callout_deleted", function (info) {
    if (info && info.uuid) {
      sendToFileMaker("deleted|" + info.uuid);
    }
  });

});

/* --------------------------------------------------
   FileMaker → Viewer
-------------------------------------------------- */

function activateFromFileMaker(uuid) {

  if (!uuid) return;

  if (!viewerReady) {
    pendingUuid = uuid;
    return;
  }

  viewer.activateCalloutLabelOrUuid(uuid);
}

/* --------------------------------------------------
   Bridge
-------------------------------------------------- */

function sendToFileMaker(payload) {

  if (!payload) return;

  try {
    if (window.FileMaker && FileMaker.PerformScriptWithOption) {
      FileMaker.PerformScriptWithOption("Test_From_nira", payload, 0);
    }
  } catch (e) {
    console.log("Bridge error:", e);
  }
}

</script>

</body>
</html>
