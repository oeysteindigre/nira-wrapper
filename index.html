<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />

<style>
html, body {
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden;
}

#viewer {
  width:100%;
  height:100%;
}
</style>

<script src="https://sdk.nira.app/js/viewer.js"></script>

</head>

<body>

<div id="viewer"></div>

<script>

/* ================================
STATE
================================ */

let viewer
let viewerReady = false

/* ================================
INIT VIEWER (SDK VERSION)
================================ */

async function startViewer(){

 alert("viewer starting");

 viewer = await NiraViewer.create({

  element: document.getElementById("viewer"),

  asset: "y-93qFDYS2W-8ACrlqVj8A",

    showNavigationTools:true,
    showMeasureTool:true,
    showCalloutsList:true,
    showRenderModes:true

  })

  viewerReady = true

}

startViewer()

/* ================================
ACTIVATE CALLOUT
================================ */

function activateFromFileMaker(uuid){

  if(!viewerReady) return

  viewer.activateCalloutLabelOrUuid(uuid)

}

/* ================================
FILTER CALLOUTS
================================ */

async function filterCallouts(uuidList){

  const ids = JSON.parse(uuidList)

  if(!viewerReady) return

  const callouts = await viewer.getCallouts()

  callouts.forEach(c => {

    if(ids.includes(c.uuid)){
      viewer.updateCallout(c.uuid,{visible:true})
    }
    else{
      viewer.updateCallout(c.uuid,{visible:false})
    }

  })

}

/* ================================
SEND EVENTS BACK TO FILEMAKER
================================ */

function sendToFileMaker(uuid){

  if(!uuid) return

  try{

    if(typeof FileMaker !== "undefined"){

      if(FileMaker.PerformScriptWithOption){
        FileMaker.PerformScriptWithOption("Test_From_nira",uuid,0)
        return
      }

      if(FileMaker.PerformScript){
        FileMaker.PerformScript("Test_From_nira",uuid)
        return
      }

    }

  }catch(e){
    console.log(e)
  }

}

</script>

</body>
</html>
