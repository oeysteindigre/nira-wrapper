<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  touch-action: none; /* viktig for iPad */
}

#niraviewer {
  width: 100%;
  height: 100%;
  border: 0;
  touch-action: none; /* hindrer gesture-conflict */
}
</style>

<script src="https://sdk.nira.app/js/viewer.js"></script>
</head>

<body>

<iframe id="niraviewer"></iframe>

<script>

/* --------------------------------------------------
   INIT
-------------------------------------------------- */

let viewerReady = false;
let pendingUuid = null;

let viewer = new NiraAPI.Viewer(
  document.getElementById("niraviewer"),
  {
    url: "https://nidaros.nira.app/g/y-93qFDYS2W-8ACrlqVj8A",

    showNavigationTools: true,
    showMeasureTool: true,
    showCalloutsList: true,
    showRenderModes: true,
    suppressCalloutDialog: true
  }
);

/* --------------------------------------------------
   MODEL READY
-------------------------------------------------- */

viewer.on("asset_load_finish", function () {
  viewerReady = true;

  if (pendingUuid) {
    viewer.activateCalloutLabelOrUuid(pendingUuid);
    pendingUuid = null;
  }
});

/* --------------------------------------------------
   FileMaker → Viewer
-------------------------------------------------- */

function activateFromFileMaker(uuid) {

  if (!uuid) return;

  if (!viewerReady) {
    pendingUuid = uuid;
    return;
  }

  try {
    viewer.activateCalloutLabelOrUuid(uuid);
  } catch (e) {
    console.log("Activation failed:", e);
  }
}

/* --------------------------------------------------
   Viewer → FileMaker
-------------------------------------------------- */

viewer.on("callout_created", function (info) {
  if (info && info.uuid) {
    sendToFileMaker("created|" + info.uuid);
  }
});

viewer.on("callout_activated", function (info) {
  if (info && info.uuid) {
    sendToFileMaker("activated|" + info.uuid);
  }
});

viewer.on("callout_deleted", function (info) {
  if (info && info.uuid) {
    sendToFileMaker("deleted|" + info.uuid);
  }
});

/* --------------------------------------------------
   Bridge til FileMaker
-------------------------------------------------- */

function sendToFileMaker(payload) {

  if (!payload) return;

  try {

    if (window.FileMaker && FileMaker.PerformScript) {
      FileMaker.PerformScript("Test_From_nira", payload);
      return;
    }

    if (window.FileMaker && FileMaker.PerformScriptWithOption) {
      FileMaker.PerformScriptWithOption("Test_From_nira", payload, 0);
      return;
    }

    if (window.parent && window.parent.FileMaker) {
      window.parent.FileMaker.PerformScriptWithOption("Test_From_nira", payload, 0);
      return;
    }

  } catch (e) {
    console.log("Bridge error:", e);
  }
}

</script>

</body>
</html>
